<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Gắn CSS -->
    <link rel="stylesheet" href="./public/css/style.css">

</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h3>Lập trình web</h3>
    </div>

    <!-- Menu -->
    <div class="menu">
        <a href="#">Home</a> |
        <a href="#">Đăng nhập</a> |
        <a href="#">Đăng ký</a>
    </div>

    <!-- Login Form -->
    <div class="login-box">

        <h2>Màn hình đăng nhập</h2>

        <form>

            <div class="form-group">
                <label>Username</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password">
            </div>

            <div class="remember">
                <input type="checkbox"> Ghi nhớ đăng nhập
            </div>

            <div class="actions">
                <a href="#">Quên mật khẩu</a>
                <button type="submit">Đăng nhập</button>
            </div>

        </form>

    </div>

    <!-- Footer -->
    <div class="footer">
        Lập trình web ©01/2024
    </div>

</div>

</body>
</html>
